appId: com.dinepos.app
name: Waiter Serve Order Flow
tags:
  - waiter
  - orders

env:
  WAITER_CODE: ${WAITER_CODE}
  WAITER_PIN: ${WAITER_PIN}

---
- launchApp:
    clearState: false

- tapOn: "Waiter"
- tapOn:
    text: "Employee Code"
- inputText: ${WAITER_CODE}
- tapOn:
    text: "PIN"
- inputText: ${WAITER_PIN}
- tapOn: "Login"

- assertVisible:
    text: "My Orders"
    timeout: 8000

- assertVisible:
    text: "Ready"
    timeout: 5000

- tapOn:
    index: 0
    text: "Served"

- assertVisible:
    text: "Served"
    timeout: 4000

- assertNotVisible:
    text: "Error"
