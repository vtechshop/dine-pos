name: API Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'automation/api/**'
      - 'automation/utils/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'automation/api/**'

env:
  NODE_VERSION: '20'
  MONGODB_VERSION: '7.0'

jobs:
  api-tests:
    name: API Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping: 1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            automation/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Start backend server
        working-directory: backend
        env:
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/dinepos_test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          REDIS_URL: redis://localhost:6379
          SUPER_ADMIN_ID: ${{ secrets.SUPER_ADMIN_ID }}
          SUPER_ADMIN_PASS: ${{ secrets.SUPER_ADMIN_PASS }}
          NODE_ENV: test
        run: |
          npm start &
          echo $! > /tmp/backend.pid
          # Wait for server to be ready
          timeout 30 bash -c 'until curl -s http://localhost:5000/api/superadmin/health -H "x-super-admin-id:$SUPER_ADMIN_ID" -H "x-super-admin-pass:$SUPER_ADMIN_PASS" | grep -q "ok\|healthy"; do sleep 2; done'

      - name: Install automation dependencies
        working-directory: automation
        run: npm ci

      - name: Create test env file
        working-directory: automation
        run: |
          cat > .env.test << EOF
          TEST_API_URL=http://localhost:5000
          SUPER_ADMIN_ID=${{ secrets.SUPER_ADMIN_ID }}
          SUPER_ADMIN_PASS=${{ secrets.SUPER_ADMIN_PASS }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          MONGODB_TEST_URI=mongodb://localhost:27017/dinepos_test
          SOCKET_URL=http://localhost:5000
          DEFAULT_TIMEOUT=30000
          SOCKET_TIMEOUT=8000
          EOF

      - name: Run API tests
        working-directory: automation
        run: npm run test:api -- --forceExit
        env:
          CI: true

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-reports
          path: |
            automation/reports/html/
            automation/reports/junit/
            automation/reports/coverage/
            automation/reports/logs/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: success()
        with:
          directory: automation/reports/coverage
          flags: api-tests

      - name: Stop backend server
        if: always()
        run: |
          if [ -f /tmp/backend.pid ]; then
            kill $(cat /tmp/backend.pid) || true
          fi
